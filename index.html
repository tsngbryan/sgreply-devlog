<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #7c6fff; --accent2: #ff6fb8;
      --glass: rgba(255,255,255,0.07); --glass-border: rgba(255,255,255,0.13);
      --text: #f0eeff; --muted: rgba(240,238,255,0.55);
      --done-color: #5fffa0; --pending-color: #ffb347;
      --bg-from: #0d0d1a; --bg-mid: #1a0d2e; --bg-to: #1a0d2e;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; background: var(--bg-from); }

    /* ── BACKGROUND ── */
    #bg { position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      animation: bgShift var(--bg-dur,14s) ease-in-out infinite alternate; }
    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1) saturate(1); }
      100% { filter: hue-rotate(var(--bg-hue,25deg)) brightness(1.12) saturate(1.1); } }

    /* ── PARTICLES ── */
    .p-star { position:fixed; border-radius:50%; background:white; z-index:1; opacity:0;
      animation: twinkle var(--dur,3s) ease-in-out infinite alternate var(--delay,0s); }
    @keyframes twinkle { 0%{opacity:0;transform:scale(.8);}100%{opacity:var(--op,.6);transform:scale(1.3);} }
    .p-ember { position:fixed; border-radius:50%; z-index:1; opacity:0;
      animation: rise var(--dur,6s) ease-in infinite var(--delay,0s); }
    @keyframes rise { 0%{opacity:0;transform:translateY(0) scale(1);}20%{opacity:var(--op,.7);}80%{opacity:var(--op,.4);}100%{opacity:0;transform:translateY(-100vh) scale(.3) translateX(var(--drift,20px));} }
    .p-petal { position:fixed; border-radius:60% 40% 50% 50%; z-index:1; opacity:0;
      animation: fall var(--dur,8s) ease-in infinite var(--delay,0s); }
    @keyframes fall { 0%{opacity:0;transform:translateY(-40px) rotate(0deg);}10%{opacity:var(--op,.6);}90%{opacity:var(--op,.3);}100%{opacity:0;transform:translateY(110vh) rotate(360deg) translateX(var(--drift,30px));} }
    .p-rain { position:fixed; width:1px; border-radius:1px; z-index:1; opacity:0;
      background:linear-gradient(to bottom,transparent,var(--rain-color,rgba(0,200,255,.4)));
      animation: rainFall var(--dur,1.2s) linear infinite var(--delay,0s); }
    @keyframes rainFall { 0%{opacity:0;transform:translateY(-20px);}10%{opacity:1;}90%{opacity:.6;}100%{opacity:0;transform:translateY(110vh);} }
    .p-orb { position:fixed; border-radius:50%; z-index:1; filter:blur(40px);
      animation: orbDrift var(--dur,20s) ease-in-out infinite alternate var(--delay,0s); }
    @keyframes orbDrift { 0%{transform:translate(0,0) scale(1);opacity:var(--op,.12);}50%{transform:translate(var(--dx,40px),var(--dy,-30px)) scale(1.2);opacity:calc(var(--op,.12)*1.5);}100%{transform:translate(var(--dx2,-20px),var(--dy2,50px)) scale(.8);opacity:var(--op,.12);} }

    /* ── HERO ── */
    #hero { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; cursor:pointer; }
    #quote-block { max-width:680px; animation:floatY 7s ease-in-out infinite alternate; }
    @keyframes floatY { 0%{transform:translateY(0);}100%{transform:translateY(-16px);} }
    .quote-mark { font-family:'Playfair Display',serif; font-size:clamp(5rem,12vw,9rem); line-height:.5; color:var(--accent); opacity:.3; display:block; margin-bottom:-1.5rem; }
    #quote-text { font-family:'Playfair Display',serif; font-size:clamp(1.25rem,3.2vw,2rem); line-height:1.6; font-style:italic; color:var(--text); text-shadow:0 2px 40px rgba(0,0,0,.6); margin-bottom:1.3rem; }
    #quote-author { font-size:.9rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); opacity:.85; }
    .hero-hint { position:absolute; bottom:2.5rem; display:flex; flex-direction:column; align-items:center; gap:.4rem; font-size:.78rem; color:var(--muted); letter-spacing:.1em; animation:bounce 2.2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(7px);} }
    .tag { display:inline-block; background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(10px); border-radius:999px; padding:.35rem 1.1rem; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:1.8rem; font-weight:600; }

    /* ── CONTENT ── */
    #content { position:relative; z-index:10; max-width:860px; margin:0 auto; padding:0 1.5rem 0; }

    /* ── MISSION ── */
    .mission-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:20px; padding:2.2rem 2.5rem; margin-bottom:3rem; position:relative; overflow:hidden; }
    .mission-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
    .mission-label { font-size:.68rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); margin-bottom:.65rem; }
    .mission-text { font-size:1.1rem; line-height:1.75; color:var(--text); font-weight:300; margin-bottom:1.8rem; }
    .milestones { display:flex; flex-direction:column; gap:.75rem; }
    .milestone-row { display:flex; align-items:center; gap:1rem; }
    .milestone-name { font-size:.78rem; font-weight:500; color:var(--muted); white-space:nowrap; min-width:190px; }
    .bar-track { flex:1; height:5px; background:rgba(255,255,255,.1); border-radius:999px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width 1.3s cubic-bezier(.4,0,.2,1); }
    .milestone-pct { font-size:.73rem; font-weight:600; color:var(--accent); min-width:2.4rem; text-align:right; }

    /* ── SESSION CARDS ── */
    .section-title { font-size:.68rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1.4rem; display:flex; align-items:center; gap:.75rem; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--glass-border); }
    .session-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(16px); border-radius:16px; padding:1.8rem 2rem; margin-bottom:1.1rem; opacity:0; transform:translateY(22px); transition:opacity .5s ease,transform .5s ease,border-color .2s; }
    .session-card.visible { opacity:1; transform:none; }
    .session-card:hover { border-color:rgba(255,255,255,.22); background:rgba(255,255,255,.09); }
    .card-date { font-size:.68rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:.25rem; }
    .card-title { font-size:1.02rem; font-weight:600; color:var(--text); margin-bottom:1.1rem; line-height:1.45; }
    .items-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:560px){ .items-col{grid-template-columns:1fr;} }
    .items-group h4 { font-size:.66rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.55rem; }
    .items-group.done h4 { color:var(--done-color); }
    .items-group.pending h4 { color:var(--pending-color); }
    .item { font-size:.83rem; line-height:1.55; color:var(--muted); display:flex; gap:.5rem; margin-bottom:.42rem; }
    .item-dot { margin-top:.38em; flex-shrink:0; width:5px; height:5px; border-radius:50%; }
    .done .item-dot { background:var(--done-color); }
    .pending .item-dot { background:var(--pending-color); }
    .item.crossed { text-decoration:line-through; opacity:.35; }

    /* ── BREAK CARDS ── */
    .break-card { border-radius:18px; margin-bottom:1.1rem; position:relative; overflow:hidden; opacity:0; transform:translateY(22px); transition:opacity .5s ease,transform .5s ease; }
    .break-card.visible { opacity:1; transform:none; }
    .break-inner { padding:1.8rem 2rem; }
    .break-card.fact { background:linear-gradient(135deg,rgba(124,111,255,.18),rgba(255,111,184,.1)); border:1px solid rgba(124,111,255,.3); }
    .break-card.quote2 { background:linear-gradient(135deg,rgba(95,255,160,.1),rgba(0,180,255,.1)); border:1px solid rgba(95,255,160,.25); }
    .break-card.stat { background:linear-gradient(135deg,rgba(255,179,71,.12),rgba(255,100,50,.08)); border:1px solid rgba(255,179,71,.3); }
    .break-label { font-size:.62rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; opacity:.65; margin-bottom:.9rem; }
    .fact .break-label { color:var(--accent); }
    .quote2 .break-label { color:var(--done-color); }
    .stat .break-label { color:var(--pending-color); }
    .break-card.fact .break-body,
    .break-card.stat .break-body { font-size:.95rem; line-height:1.7; color:var(--text); font-weight:300; }
    .break-card.quote2 .break-body { font-family:'Playfair Display',serif; font-size:1.05rem; line-height:1.65; font-style:italic; color:var(--text); }
    .break-card.quote2 .break-attr { font-size:.78rem; font-weight:600; color:var(--done-color); margin-top:.8rem; letter-spacing:.06em; }
    .break-card.stat .stat-number { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; color:var(--pending-color); line-height:1; margin-bottom:.4rem; }

    /* Break card image strip */
    .break-img { position:relative; width:100%; height:160px; overflow:hidden; }
    .break-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 6s ease; }
    .break-card:hover .break-img img { transform:scale(1.04); }
    .break-img-caption { position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(to top,rgba(0,0,0,.65),transparent);
      padding:.5rem .9rem .45rem; display:flex; align-items:center; gap:.4rem; }
    .break-img-caption svg { opacity:.7; flex-shrink:0; }
    .break-img-caption span { font-size:.7rem; color:rgba(255,255,255,.85); letter-spacing:.04em; }

    /* ── GALLERY SECTION ── */
    #gallery-wrap { position:relative; z-index:10; max-width:860px; margin:0 auto; padding:0 1.5rem 5rem; }
    #gallery-divider { display:flex; align-items:center; gap:.75rem; font-size:.68rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1.4rem; margin-top:2.5rem; }
    #gallery-divider::after { content:''; flex:1; height:1px; background:var(--glass-border); }

    #gallery-grid { columns:2; column-gap:.9rem; }
    @media(min-width:560px){ #gallery-grid { columns:3; } }
    @media(min-width:760px){ #gallery-grid { columns:4; } }

    .gallery-card { break-inside:avoid; margin-bottom:.9rem; border-radius:12px; overflow:hidden; position:relative; opacity:0; transform:translateY(18px); transition:opacity .5s ease,transform .5s ease; cursor:pointer; }
    .gallery-card.visible { opacity:1; transform:none; }
    .gallery-card img { width:100%; display:block; object-fit:cover; transition:transform 5s ease; }
    .gallery-card:hover img { transform:scale(1.06); }
    .gallery-overlay { position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 100%);
      padding:.7rem .75rem .6rem; }
    .gallery-name { font-size:.78rem; font-weight:600; color:white; line-height:1.3; }
    .gallery-place { font-size:.65rem; color:rgba(255,255,255,.65); margin-top:.1rem; }
    .gallery-pin { font-size:.62rem; color:var(--accent); margin-right:.2rem; }

    #gallery-sentinel { height:40px; display:flex; align-items:center; justify-content:center; }
    .gallery-loading { font-size:.75rem; color:var(--muted); letter-spacing:.08em; display:flex; align-items:center; gap:.5rem; }
    .mini-spinner { width:14px; height:14px; border-radius:50%; border:2px solid var(--glass-border); border-top-color:var(--accent); animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }

    /* ── MISC ── */
    #loading { text-align:center; padding:3rem; color:var(--muted); font-size:.9rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }
    .spinner { width:26px; height:26px; border-radius:50%; border:2px solid var(--glass-border); border-top-color:var(--accent); animation:spin .8s linear infinite; }
    #theme-switcher { position:fixed; top:1.2rem; right:1.2rem; z-index:100; display:flex; gap:.4rem; }
    .theme-dot { width:11px; height:11px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .2s,border-color .2s; }
    .theme-dot:hover,.theme-dot.active { transform:scale(1.45); border-color:white; }
    .fade-target { opacity:0; transform:translateY(18px); transition:opacity .6s,transform .6s; }
    .fade-target.visible { opacity:1; transform:none; }
  </style>
</head>

const currentThemeIdx = Math.floor(Math.random() * THEMES.length);

function applyTheme(idx) {
  const t = THEMES[idx];
  const r = document.documentElement.style;
  r.setProperty('--accent',  t.accent);
  r.setProperty('--accent2', t.accent2);
  r.setProperty('--bg-from', t.from);
  r.setProperty('--bg-mid',  t.mid);
  r.setProperty('--bg-to',   t.to);
  r.setProperty('--bg-hue',  t.hue);
  r.setProperty('--bg-dur',  t.dur);
  document.querySelectorAll('.theme-dot').forEach((d,i) => d.classList.toggle('active', i === idx));
  respawnParticles(t.anim, t.accent, t.accent2);
}

function buildThemeSwitcher() {
  const sw = document.getElementById('theme-switcher');
  THEMES.forEach((t,i) => {
    const d = document.createElement('div');
    d.className = 'theme-dot'; d.title = t.name; d.style.background = t.dot;
    d.onclick = e => { e.stopPropagation(); applyTheme(i); };
    sw.appendChild(d);
  });
}

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
function clearParticles() { document.querySelectorAll('[class^="p-"]').forEach(el=>el.remove()); }
function rand(a,b) { return Math.random()*(b-a)+a; }

function makeStars(n=80) {
  for (let i=0;i<n;i++){const el=document.createElement('div');el.className='p-star';const s=rand(.5,2.8);el.style.cssText=`width:${s}px;height:${s}px;left:${rand(0,100)}vw;top:${rand(0,100)}vh;--dur:${rand(2,5).toFixed(1)}s;--op:${rand(.2,.75).toFixed(2)};animation-delay:${rand(0,5).toFixed(1)}s;`;document.body.appendChild(el);}
}
function makeEmbers(n=60,c1,c2) {
  const cols=[c1,c2,'#fff8dc','#ffd700'];
  for(let i=0;i<n;i++){const el=document.createElement('div');el.className='p-ember';const s=rand(2,6);el.style.cssText=`width:${s}px;height:${s}px;left:${rand(0,100)}vw;bottom:${rand(-10,30)}vh;background:${cols[i%4]};--dur:${rand(4,10).toFixed(1)}s;--op:${rand(.4,.8).toFixed(2)};--drift:${rand(-40,40).toFixed(0)}px;animation-delay:${rand(0,8).toFixed(1)}s;border-radius:50%;`;document.body.appendChild(el);}
}
function makePetals(n=40,c1,c2) {
  const cols=[c1,c2,'rgba(255,200,220,.8)','rgba(255,230,240,.6)'];
  for(let i=0;i<n;i++){const el=document.createElement('div');el.className='p-petal';const s=rand(6,16);el.style.cssText=`width:${s}px;height:${s*rand(.6,1)}px;left:${rand(-5,105)}vw;top:${rand(-20,0)}vh;background:${cols[i%4]};--dur:${rand(6,14).toFixed(1)}s;--op:${rand(.3,.7).toFixed(2)};--drift:${rand(-60,60).toFixed(0)}px;animation-delay:${rand(0,12).toFixed(1)}s;opacity:0;`;document.body.appendChild(el);}
}
function makeRain(n=80,c1) {
  for(let i=0;i<n;i++){const el=document.createElement('div');el.className='p-rain';const h=rand(40,140);el.style.cssText=`height:${h}px;left:${rand(0,100)}vw;top:${rand(-30,0)}vh;--rain-color:${c1};--dur:${rand(.8,2).toFixed(2)}s;animation-delay:${rand(0,3).toFixed(2)}s;opacity:0;`;document.body.appendChild(el);}
}
function makeOrbs(n=8,c1,c2) {
  for(let i=0;i<n;i++){const el=document.createElement('div');el.className='p-orb';const s=rand(150,350);el.style.cssText=`width:${s}px;height:${s}px;left:${rand(0,80)}vw;top:${rand(0,80)}vh;background:${i%2?c2:c1};--dur:${rand(14,28).toFixed(0)}s;--op:${rand(.08,.18).toFixed(2)};--dx:${rand(-80,80).toFixed(0)}px;--dy:${rand(-60,60).toFixed(0)}px;--dx2:${rand(-50,50).toFixed(0)}px;--dy2:${rand(-80,80).toFixed(0)}px;animation-delay:${rand(0,10).toFixed(1)}s;`;document.body.appendChild(el);}
}
function respawnParticles(anim,c1,c2) {
  clearParticles();
  if(anim==='stars')  makeStars(90);
  if(anim==='embers') makeEmbers(55,c1,c2);
  if(anim==='petals') makePetals(45,c1,c2);
  if(anim==='rain')   makeRain(75,c1);
  if(anim==='orbs')   { makeOrbs(8,c1,c2); makeStars(30); }
}

// ══════════════════════════════════════════════
//  PARSE SESSION LOG
// ══════════════════════════════════════════════
function parseSessionLog(md) {
  return md.split(/\n---\n/).filter(s=>/^##\s/m.test(s)).map(entry=>{
    const heading=(entry.trim().split('\n').find(l=>/^##\s/.test(l))||'').replace(/^##\s*/,'').trim();
    const date=(heading.match(/(\d{4}-\d{2}-\d{2})/)||['',''])[1];
    const subtitle=heading.replace(/^[\d/\s–—-]+/,'').replace(/^[—–-]\s*/,'').trim();
    return { date, subtitle, doneItems:extractItems(entry,'Done'), pendingItems:extractItems(entry,'Pending') };
  });
}
function extractItems(section,heading) {
  const m=section.match(new RegExp(`###\\s*${heading}\\s*\\n([\\s\\S]*?)(?=###|$)`,'i'));
  if(!m)return[];
  return m[1].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>{
    const text=l.replace(/^-\s*/,'').trim();
    const crossed=/~~.*~~/.test(text);
    const clean=text.replace(/~~(.*?)~~/g,'$1').replace(/✅.*$/,'').replace(/\*\*(.*?)\*\*/g,'$1').trim();
    return {text:clean,crossed};
  });
}

// ══════════════════════════════════════════════
//  BREAK CARDS (with optional location image)
// ══════════════════════════════════════════════
let breakLocationIdx = 0;
const shuffledLocations = [...LOCATIONS].sort(()=>Math.random()-.5);

function buildBreakCard(item, withImage) {
  const el=document.createElement('div');
  el.className=`break-card ${item.type}`;

  // Optional location image strip (on fact and stat cards only)
  if (withImage && item.type !== 'quote2') {
    const loc = shuffledLocations[breakLocationIdx % shuffledLocations.length];
    breakLocationIdx++;
    const strip = document.createElement('div');
    strip.className = 'break-img';
    strip.innerHTML = `
      <img src="${imgUrl(loc.id, 900, 320)}" alt="${loc.name}" loading="lazy" onerror="this.parentElement.style.display='none'">
      <div class="break-img-caption">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <span>${loc.name} · ${loc.place}</span>
      </div>`;
    el.appendChild(strip);
  }

  const inner = document.createElement('div');
  inner.className = 'break-inner';

  if (item.type==='stat') {
    inner.innerHTML=`<div class="break-label">✦ By the numbers</div><div class="stat-number">${item.number}</div><div class="break-body">${item.body}</div>`;
  } else if (item.type==='quote2') {
    inner.innerHTML=`<div class="break-label">✦ Worth remembering</div><div class="break-body">${item.q}</div><div class="break-attr">— ${item.a}</div>`;
  } else {
    inner.innerHTML=`<div class="break-label">✦ Did you know?</div><div class="break-body">${item.body}</div>`;
  }
  el.appendChild(inner);
  return el;
}

function shuffleArray(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ══════════════════════════════════════════════
//  RENDER SESSION CARDS
// ══════════════════════════════════════════════
function renderCards(entries) {
  const container=document.getElementById('log-container');
  container.innerHTML='';
  if(!entries.length){container.innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem">No entries found.</p>';return;}
  const breaks=shuffleArray(BREAKS);
  let bi=0;
  entries.forEach((e,i)=>{
    const card=document.createElement('div');card.className='session-card';card.style.transitionDelay=`${i*70}ms`;
    const dH=e.doneItems.map(it=>`<div class="item${it.crossed?' crossed':''}"><span class="item-dot"></span><span>${it.text}</span></div>`).join('');
    const pH=e.pendingItems.map(it=>`<div class="item${it.crossed?' crossed':''}"><span class="item-dot"></span><span>${it.text}</span></div>`).join('');
    card.innerHTML=`<div class="card-date">${formatDate(e.date)}</div><div class="card-title">${e.subtitle||'Session'}</div><div class="items-col"><div class="items-group done"><h4>✓ Done</h4>${dH||'<div class="item"><span class="item-dot"></span><span style="opacity:.3">—</span></div>'}</div><div class="items-group pending"><h4>→ Pending</h4>${pH||'<div class="item"><span class="item-dot"></span><span style="opacity:.3">—</span></div>'}</div></div>`;
    container.appendChild(card);

    // Insert break card every 2 session entries
    if ((i+1)%2===0 && i<entries.length-1) {
      const withImg = (bi%2===0); // every other break card gets an image
      const bc=buildBreakCard(breaks[bi%breaks.length], withImg);
      bc.style.transitionDelay=`${(i+.5)*70}ms`;
      container.appendChild(bc);
      bi++;
    }
  });

  observeCards();
}

function formatDate(d) {
  if(!d)return'';
  try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});}
  catch{return d;}
}

// ══════════════════════════════════════════════
//  INFINITE GALLERY
// ══════════════════════════════════════════════
const galleryLocations = shuffleArray(LOCATIONS);
let galleryIdx = 0;
let galleryObserver = null;

function buildGalleryCard(loc) {
  const card = document.createElement('div');
  card.className = 'gallery-card';
  // Random aspect ratio for visual masonry variety
  const heights = [200, 240, 180, 260, 210, 230];
  const h = heights[Math.floor(Math.random()*heights.length)];
  card.innerHTML = `
    <img src="${imgUrl(loc.id, 600, h)}" alt="${loc.name}" loading="lazy" height="${h}"
         onerror="this.closest('.gallery-card').style.display='none'">
    <div class="gallery-overlay">
      <div class="gallery-name"><span class="gallery-pin">📍</span>${loc.name}</div>
      <div class="gallery-place">${loc.place}</div>
    </div>`;
  return card;
}

function addGalleryBatch(n=6) {
  const grid = document.getElementById('gallery-grid');
  const obs = new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:.05});

  for (let i=0;i<n;i++) {
    const loc = galleryLocations[galleryIdx % galleryLocations.length];
    galleryIdx++;
    // Re-shuffle when we've gone through all once
    if (galleryIdx % galleryLocations.length === 0) shuffleArray(galleryLocations);
    const card = buildGalleryCard(loc);
    card.style.transitionDelay = `${(i%3)*80}ms`;
    grid.appendChild(card);
    obs.observe(card);
  }
}

function initGallery() {
  addGalleryBatch(9); // initial batch
  const sentinel = document.getElementById('gallery-sentinel');
  galleryObserver = new IntersectionObserver(es=>{
    if (es[0].isIntersecting) addGalleryBatch(6);
  }, {rootMargin:'200px'});
  galleryObserver.observe(sentinel);
}

// ══════════════════════════════════════════════
//  INTERSECTION OBSERVERS
// ══════════════════════════════════════════════
function observeCards() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.08});
  document.querySelectorAll('.session-card,.break-card').forEach(c=>obs.observe(c));
}
function observeFadeTargets() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.12});
  document.querySelectorAll('.fade-target').forEach(el=>obs.observe(el));
}

// ══════════════════════════════════════════════
//  FETCH
// ══════════════════════════════════════════════
async function fetchLog() {
  const url=`https://raw.githubusercontent.com/${CONFIG.githubOwner}/${CONFIG.githubRepo}/${CONFIG.githubBranch}/${CONFIG.logPath}`;
  try {
    const res=await fetch(url);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    renderCards(parseSessionLog(await res.text()));
    animateBars();
  } catch(err) {
    document.getElementById('log-container').innerHTML=`<div style="text-align:center;padding:2rem;color:var(--pending-color)"><p>Could not fetch session log.</p><p style="font-size:.78rem;opacity:.5;margin-top:.4rem">${err.message}</p></div>`;
    animateBars();
  }
}

function scrollToContent() { document.getElementById('content').scrollIntoView({behavior:'smooth'}); }

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
buildThemeSwitcher();
applyTheme(currentThemeIdx);
setQuote();
buildMission();
observeFadeTargets();
fetchLog();
initGallery();
</script>
