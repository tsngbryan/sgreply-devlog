    :root {

      --accent2: #ffaacc;
      --glass: rgba(0,0,0,0.35);
      --glass-border: rgba(255,255,255,0.12);

    body { font-family: 'Inter', system-ui, sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; background: #0a0a14; }

        rgba(0,0,0,0.80) 100%

    .quote-mark { font-family:'Playfair Display',serif; font-size:clamp(5rem,12vw,9rem); line-height:.5; color:var(--accent); opacity:.35; display:block; margin-bottom:-1.5rem; }

// source.unsplash.com is discontinued — use loremflickr (keyword-based, free, no key)
function unsplashUrl(query, w=1600, h=900) {
  const kw = query.replace(/\+/g, ',');
  // deterministic seed so same location always returns same photo
  const seed = query.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 9999;
  return `https://loremflickr.com/${w}/${h}/${kw}?lock=${seed}`;
}

function shuffleArray(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ══════════════════════════════════════════════
//  PARSE SESSION LOG
// ══════════════════════════════════════════════
function parseSessionLog(md) {
  return md.split(/\n---\n/).filter(s=>/^##\s/m.test(s)).map(entry=>{
    const heading=(entry.trim().split('\n').find(l=>/^##\s/.test(l))||'').replace(/^##\s*/,'').trim();
    const date=(heading.match(/(\d{4}-\d{2}-\d{2})/)||['',''])[1];
    const subtitle=heading.replace(/^[\d/\s–—-]+/,'').replace(/^[—–-]\s*/,'').trim();
    return{date,subtitle,doneItems:extractItems(entry,'Done'),pendingItems:extractItems(entry,'Pending')};
  });
}

function extractItems(section,heading) {
  const m=section.match(new RegExp(`###\\s*${heading}\\s*\\n([\\s\\S]*?)(?=###|$)`,'i'));
  if(!m)return[];
  return m[1].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>{
    const text=l.replace(/^-\s*/,'').trim();
    const crossed=/~~.*~~/.test(text);
    const clean=text.replace(/~~(.*?)~~/g,'$1').replace(/✅.*$/,'').replace(/\*\*(.*?)\*\*/g,'$1').trim();
    return{text:clean,crossed};
  });
}

// ══════════════════════════════════════════════
const bgScenes = shuffleArray(SCENES);
let bgIdx = 0;

function buildBreakCard(item, useImg) {
  const el=document.createElement('div');
  el.className=`break-card ${useImg&&item.type!=='quote2'?'imgbg':'plain'} ${item.type}`;

  if (useImg && item.type !== 'quote2') {
    const scene=bgScenes[bgIdx%bgScenes.length]; bgIdx++;
    const img=document.createElement('img');
    img.className='bgimg'; img.loading='lazy'; img.alt=scene.name;
    img.src=unsplashUrl(scene.q,900,500);
    img.onerror=()=>{img.style.display='none';el.style.background='linear-gradient(135deg,rgba(0,0,0,.55),rgba(20,20,40,.7))';};
    const dim=document.createElement('div'); dim.className='bgdim';
    const badge=document.createElement('div'); badge.className='loc-badge';
    badge.innerHTML=`📍 ${scene.name} · ${scene.place}`;
    el.append(img,dim,badge);
  }

  const inner=document.createElement('div'); inner.className='break-inner';
  if(item.type==='stat'){
    inner.innerHTML=`<div class="break-label">✦ By the numbers</div><div class="stat-number">${item.number}</div><div class="break-body">${item.body}</div>`;
  } else if(item.type==='quote2'){
    inner.innerHTML=`<div class="break-label">✦ Worth remembering</div><div class="break-body">${item.q}</div><div class="break-attr">— ${item.a}</div>`;
  } else {
    inner.innerHTML=`<div class="break-label">✦ Did you know?</div><div class="break-body">${item.body}</div>`;
  }
  el.appendChild(inner);
  return el;
}

// ══════════════════════════════════════════════
//  RENDER SESSION LOG
// ══════════════════════════════════════════════
function renderCards(entries) {
  const container=document.getElementById('log-container'); container.innerHTML='';
  if(!entries.length){container.innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem">No entries found.</p>';return;}
  const breaks=shuffleArray(BREAKS); let bi=0;
  entries.forEach((e,i)=>{
    const card=document.createElement('div');card.className='session-card';card.style.transitionDelay=`${i*70}ms`;
    const dH=e.doneItems.map(it=>`<div class="item${it.crossed?' crossed':''}"><span class="item-dot"></span><span>${it.text}</span></div>`).join('');
    const pH=e.pendingItems.map(it=>`<div class="item${it.crossed?' crossed':''}"><span class="item-dot"></span><span>${it.text}</span></div>`).join('');
    card.innerHTML=`<div class="card-date">${formatDate(e.date)}</div><div class="card-title">${e.subtitle||'Session'}</div><div class="items-col"><div class="items-group done"><h4>✓ Done</h4>${dH||noItems()}</div><div class="items-group pending"><h4>→ Pending</h4>${pH||noItems()}</div></div>`;
    container.appendChild(card);
    if((i+1)%2===0 && i<entries.length-1){
      const bc=buildBreakCard(breaks[bi%breaks.length],bi%2===0);
      bc.style.transitionDelay=`${(i+.5)*70}ms`;
      container.appendChild(bc); bi++;
    }
  });
  observeCards();
}

function noItems(){return'<div class="item"><span class="item-dot"></span><span style="opacity:.3">—</span></div>';}
function formatDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});}catch{return d;}}

// ══════════════════════════════════════════════
//  GALLERY — full-width panels, keyword images
// ══════════════════════════════════════════════
const panelObs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');panelObs.unobserve(e.target);}});},{threshold:.04});

function buildPanel(scene) {
  const panel=document.createElement('div'); panel.className='gallery-panel';
  const img=document.createElement('img');
  img.loading='lazy'; img.alt=scene.name;
  img.src=unsplashUrl(scene.q,1600,900);
  // on error: show a dark gradient placeholder instead of collapsing (collapsing causes scroll loop)
  img.onerror=()=>{img.style.display='none';panel.style.background='linear-gradient(135deg,#0d1117,#1a1f2e)';};
  const dim=document.createElement('div'); dim.className='panel-dim';
  const info=document.createElement('div'); info.className='panel-info';
  info.innerHTML=`<div class="panel-name">${scene.name}</div><div class="panel-place"><span class="panel-pin">📍</span>${scene.place}</div>`;
  panel.append(img,dim,info);
  panelObs.observe(panel);
  return panel;
}

const MAX_PANELS = 60; // prevent runaway loading
let totalPanels = 0;
let sentinelObs = null;

function addGalleryBatch(n=3) {
  if(totalPanels >= MAX_PANELS){ if(sentinelObs)sentinelObs.disconnect(); document.getElementById('gallery-sentinel').style.display='none'; return; }
  const grid=document.getElementById('gallery-grid');
  const add=Math.min(n, MAX_PANELS-totalPanels);
  for(let i=0;i<add;i++){
    const scene=shuffledScenes[sceneIdx%shuffledScenes.length]; sceneIdx++;
    if(sceneIdx%shuffledScenes.length===0)shuffledScenes.sort(()=>Math.random()-.5);
    grid.appendChild(buildPanel(scene)); totalPanels++;
  }
}

function initGallery() {
  addGalleryBatch(3);
  sentinelObs=new IntersectionObserver(es=>{if(es[0].isIntersecting)addGalleryBatch(3);},{rootMargin:'200px'});
  sentinelObs.observe(document.getElementById('gallery-sentinel'));
}

// ══════════════════════════════════════════════
//  OBSERVERS
// ══════════════════════════════════════════════
function observeCards() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.07});
  document.querySelectorAll('.session-card,.break-card').forEach(c=>obs.observe(c));
}
function observeFadeTargets() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.1});
  document.querySelectorAll('.fade-target').forEach(el=>obs.observe(el));
}

// ══════════════════════════════════════════════
//  FETCH LOG
// ══════════════════════════════════════════════
async function fetchLog() {
  const url=`https://raw.githubusercontent.com/${CONFIG.githubOwner}/${CONFIG.githubRepo}/${CONFIG.githubBranch}/${CONFIG.logPath}`;
  try {
    const res=await fetch(url); if(!res.ok)throw new Error(`HTTP ${res.status}`);
    renderCards(parseSessionLog(await res.text())); animateBars();
  } catch(err) {
    document.getElementById('log-container').innerHTML=`<div style="text-align:center;padding:2rem;color:var(--pending-color)"><p>Could not fetch session log.</p><p style="font-size:.78rem;opacity:.45;margin-top:.4rem">${err.message}</p></div>`;
    animateBars();
  }
}

function scrollToContent(){document.getElementById('content').scrollIntoView({behavior:'smooth'});}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
setPageBackground();
setQuote();
buildMission();
observeFadeTargets();
fetchLog();
initGallery();
</script>
