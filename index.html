    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #b5aaff;
      --accent2: #ffaacc;
      --glass: rgba(0,0,0,0.35);
      --glass-border: rgba(255,255,255,0.12);
      --text: #f4f2ff;
      --muted: rgba(244,242,255,0.58);
      --done-color: #6fffa8;
      --pending-color: #ffc46b;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; background: #0a0a14; }

    /* ── PAGE BACKGROUND — single image, full page ── */
    #page-bg { position: fixed; inset: 0; z-index: 0; }
    #page-bg img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* Gradient overlay: lighter at top (hero visible), heavier below (text readable) */
    #page-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.42) 0%,
        rgba(0,0,0,0.60) 30%,
        rgba(0,0,0,0.72) 60%,
        rgba(0,0,0,0.80) 100%
      );
    }

    /* ── HERO ── */
    #hero {
      position: relative; z-index: 2;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem; cursor: pointer;
    }
    #quote-block { max-width: 700px; animation: floatY 7s ease-in-out infinite alternate; }

    .quote-mark { font-family:'Playfair Display',serif; font-size:clamp(5rem,12vw,9rem); line-height:.5; color:var(--accent); opacity:.35; display:block; margin-bottom:-1.5rem; }
    #quote-text { font-family:'Playfair Display',serif; font-size:clamp(1.3rem,3.5vw,2.2rem); line-height:1.58; font-style:italic; color:#fff; text-shadow:0 2px 30px rgba(0,0,0,.7); margin-bottom:1.4rem; }
    #quote-author { font-size:.88rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
    .tag { display:inline-block; background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(8px); border-radius:999px; padding:.35rem 1.1rem; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:1.8rem; font-weight:600; }
    .hero-hint { position:absolute; bottom:2.5rem; display:flex; flex-direction:column; align-items:center; gap:.4rem; font-size:.78rem; color:rgba(255,255,255,.5); letter-spacing:.1em; animation:bounce 2.2s ease-in-out infinite; }

    #photo-credit { position:absolute; bottom:1.2rem; left:1.5rem; font-size:.62rem; color:rgba(255,255,255,.38); letter-spacing:.05em; }

    /* ── CONTENT ── */
    #content { position:relative; z-index:2; max-width:860px; margin:0 auto; padding:0 1.5rem 0; }

    /* ── MISSION ── */
    .mission-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(22px); border-radius:20px; padding:2.2rem 2.5rem; margin-bottom:3rem; position:relative; overflow:hidden; }
    .mission-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
    .mission-label { font-size:.68rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); margin-bottom:.65rem; }
    .mission-text { font-size:1.08rem; line-height:1.78; color:var(--text); font-weight:300; margin-bottom:1.8rem; }
    .next-up { display:flex; flex-direction:column; gap:.55rem; }
    .next-up-item { display:flex; align-items:flex-start; gap:.7rem; font-size:.83rem; line-height:1.5; color:var(--muted); }
    .next-up-num { flex-shrink:0; width:1.4rem; height:1.4rem; border-radius:50%; background:rgba(181,170,255,.15); border:1px solid rgba(181,170,255,.3); display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; color:var(--accent); margin-top:.05em; }

    /* ── SESSION CARDS ── */
    .section-title { font-size:.68rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1.4rem; display:flex; align-items:center; gap:.75rem; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--glass-border); }
    .session-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(18px); border-radius:16px; padding:1.8rem 2rem; margin-bottom:1.1rem; opacity:0; transform:translateY(20px); transition:opacity .55s ease,transform .55s ease,background .2s; }
    .session-card.visible { opacity:1; transform:none; }
    .session-card:hover { background:rgba(0,0,0,.48); }
    .card-date { font-size:.68rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:.25rem; }
    .card-title { font-size:1rem; font-weight:600; color:var(--text); margin-bottom:1.1rem; line-height:1.45; }
    .items-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:560px){.items-col{grid-template-columns:1fr;}}
    .items-group h4 { font-size:.65rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.55rem; }
    .items-group.done h4 { color:var(--done-color); }
    .items-group.pending h4 { color:var(--pending-color); }
    .item { font-size:.83rem; line-height:1.55; color:var(--muted); display:flex; gap:.5rem; margin-bottom:.42rem; }
    .item-dot { margin-top:.38em; flex-shrink:0; width:5px; height:5px; border-radius:50%; }
    .done .item-dot { background:var(--done-color); }
    .pending .item-dot { background:var(--pending-color); }
    .item.crossed { text-decoration:line-through; opacity:.32; }

    /* ── BREAK CARDS — plain ── */
    .break-card { border-radius:18px; margin-bottom:1.1rem; overflow:hidden; position:relative; opacity:0; transform:translateY(20px); transition:opacity .55s ease,transform .55s ease; }
    .break-card.visible { opacity:1; transform:none; }
    .break-card.plain { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(18px); padding:1.8rem 2rem; }
    .break-label { font-size:.62rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); opacity:.8; margin-bottom:.9rem; }
    .break-body { font-size:.95rem; line-height:1.72; color:var(--text); font-weight:300; }
    .quote2 .break-body { font-family:'Playfair Display',serif; font-size:1.05rem; line-height:1.65; font-style:italic; }
    .quote2 .break-attr { font-size:.78rem; font-weight:600; color:var(--done-color); margin-top:.8rem; letter-spacing:.06em; }
    .stat-number { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; color:var(--pending-color); line-height:1; margin-bottom:.4rem; }

    .break-card.imgbg .bgimg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform 8s ease; }
    .break-card.imgbg:hover .bgimg { transform:scale(1.05); }
    .break-card.imgbg .bgdim { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.35) 60%,rgba(0,0,0,.15) 100%); }

    #gallery-grid { position:relative; z-index:2; width:100%; margin-top:1.5rem; }

    .panel-pin { color:var(--accent); margin-right:.3rem; }

    .gallery-loading { font-size:.75rem; color:var(--muted); letter-spacing:.08em; display:flex; align-items:center; gap:.5rem; }
    .mini-spinner { width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,.15); border-top-color:var(--accent); animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }

    /* ── MISC ── */
    #loading { text-align:center; padding:3rem; color:var(--muted); font-size:.9rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }
    .spinner { width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,.1); border-top-color:var(--accent); animation:spin .8s linear infinite; }
    .fade-target { opacity:0; transform:translateY(16px); transition:opacity .65s,transform .65s; }
    .fade-target.visible { opacity:1; transform:none; }
  </style>

// source.unsplash.com is discontinued — use loremflickr (keyword-based, free, no key)
// Sizes snap to common breakpoints so loremflickr can cache effectively
function snapSize(px) {
  const steps = [320,480,640,800,960,1080,1280,1440,1600,1920,2560];
  return steps.find(s => s >= px) || steps[steps.length-1];
}
function screenW() { return snapSize(window.screen.width * (window.devicePixelRatio||1)); }
function screenH() { return snapSize(window.screen.height * (window.devicePixelRatio||1)); }
function viewW()   { return snapSize(window.innerWidth); }
function viewH(multiplier=1) { return snapSize(Math.round(window.innerHeight * multiplier)); }

function unsplashUrl(query, w, h) {
  const kw = query.replace(/\+/g, ',');
  const seed = query.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 9999;
  return `https://loremflickr.com/${w}/${h}/${kw}?lock=${seed}`;
}

function shuffleArray(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ══════════════════════════════════════════════
//  PARSE SESSION LOG
// ══════════════════════════════════════════════
function parseSessionLog(md) {
  return md.split(/\n---\n/).filter(s=>/^##\s/m.test(s)).map(entry=>{
    const heading=(entry.trim().split('\n').find(l=>/^##\s/.test(l))||'').replace(/^##\s*/,'').trim();
    const date=(heading.match(/(\d{4}-\d{2}-\d{2})/)||['',''])[1];
    const subtitle=heading.replace(/^[\d/\s–—-]+/,'').replace(/^[—–-]\s*/,'').trim();
    return{date,subtitle,doneItems:extractItems(entry,'Done'),pendingItems:extractItems(entry,'Pending')};
  });
}

function extractItems(section,heading) {
  const m=section.match(new RegExp(`###\\s*${heading}\\s*\\n([\\s\\S]*?)(?=###|$)`,'i'));
  if(!m)return[];
  return m[1].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>{
    const text=l.replace(/^-\s*/,'').trim();
    const crossed=/~~.*~~/.test(text);
    const clean=text.replace(/~~(.*?)~~/g,'$1').replace(/✅.*$/,'').replace(/\*\*(.*?)\*\*/g,'$1').trim();
    return{text:clean,crossed};
  });
}

const bgScenes = shuffleArray(SCENES);
let bgIdx = 0;

function buildBreakCard(item, useImg) {
  const el=document.createElement('div');
  el.className=`break-card ${useImg&&item.type!=='quote2'?'imgbg':'plain'} ${item.type}`;

  if (useImg && item.type !== 'quote2') {
    const scene=bgScenes[bgIdx%bgScenes.length]; bgIdx++;
    const img=document.createElement('img');
    img.className='bgimg'; img.loading='lazy'; img.alt=scene.name;
    img.src=unsplashUrl(scene.q, viewW(), 500);
    img.onerror=()=>{img.style.display='none';el.style.background='linear-gradient(135deg,rgba(0,0,0,.55),rgba(20,20,40,.7))';};
    const dim=document.createElement('div'); dim.className='bgdim';
    const badge=document.createElement('div'); badge.className='loc-badge';
    badge.innerHTML=`📍 ${scene.name} · ${scene.place}`;
    el.append(img,dim,badge);
  }

  const inner=document.createElement('div'); inner.className='break-inner';
  if(item.type==='stat'){
    inner.innerHTML=`<div class="break-label">✦ By the numbers</div><div class="stat-number">${item.number}</div><div class="break-body">${item.body}</div>`;
  } else if(item.type==='quote2'){
    inner.innerHTML=`<div class="break-label">✦ Worth remembering</div><div class="break-body">${item.q}</div><div class="break-attr">— ${item.a}</div>`;
  } else {
    inner.innerHTML=`<div class="break-label">✦ Did you know?</div><div class="break-body">${item.body}</div>`;
  }
  el.appendChild(inner);
  return el;
}

// ══════════════════════════════════════════════
//  RENDER SESSION LOG
// ══════════════════════════════════════════════
function renderCards(entries) {
  const container=document.getElementById('log-container'); container.innerHTML='';
  if(!entries.length){container.innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem">No entries found.</p>';return;}
  const breaks=shuffleArray(BREAKS); let bi=0;
  entries.forEach((e,i)=>{
    const card=document.createElement('div');card.className='session-card';card.style.transitionDelay=`${i*70}ms`;
    const dH=e.doneItems.map(it=>`<div class="item${it.crossed?' crossed':''}"><span class="item-dot"></span><span>${it.text}</span></div>`).join('');
    const pH=e.pendingItems.map(it=>`<div class="item${it.crossed?' crossed':''}"><span class="item-dot"></span><span>${it.text}</span></div>`).join('');
    card.innerHTML=`<div class="card-date">${formatDate(e.date)}</div><div class="card-title">${e.subtitle||'Session'}</div><div class="items-col"><div class="items-group done"><h4>✓ Done</h4>${dH||noItems()}</div><div class="items-group pending"><h4>→ Pending</h4>${pH||noItems()}</div></div>`;
    container.appendChild(card);
    if((i+1)%2===0 && i<entries.length-1){
      const bc=buildBreakCard(breaks[bi%breaks.length],bi%2===0);
      bc.style.transitionDelay=`${(i+.5)*70}ms`;
      container.appendChild(bc); bi++;
    }
  });
  observeCards();
}

function noItems(){return'<div class="item"><span class="item-dot"></span><span style="opacity:.3">—</span></div>';}
function formatDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});}catch{return d;}}

// ══════════════════════════════════════════════
//  GALLERY — full-width panels, keyword images
// ══════════════════════════════════════════════
const panelObs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');panelObs.unobserve(e.target);}});},{threshold:.04});

function buildPanel(scene) {
  const panel=document.createElement('div'); panel.className='gallery-panel';
  const img=document.createElement('img');
  img.loading='lazy'; img.alt=scene.name;
  img.src=unsplashUrl(scene.q, viewW(), viewH(0.88));
  // on error: show a dark gradient placeholder instead of collapsing (collapsing causes scroll loop)
  img.onerror=()=>{img.style.display='none';panel.style.background='linear-gradient(135deg,#0d1117,#1a1f2e)';};
  const dim=document.createElement('div'); dim.className='panel-dim';
  const info=document.createElement('div'); info.className='panel-info';
  info.innerHTML=`<div class="panel-name">${scene.name}</div><div class="panel-place"><span class="panel-pin">📍</span>${scene.place}</div>`;
  panel.append(img,dim,info);
  panelObs.observe(panel);
  return panel;
}

const MAX_PANELS = 60; // prevent runaway loading
let totalPanels = 0;
let sentinelObs = null;

function addGalleryBatch(n=3) {
  if(totalPanels >= MAX_PANELS){ if(sentinelObs)sentinelObs.disconnect(); document.getElementById('gallery-sentinel').style.display='none'; return; }
  const grid=document.getElementById('gallery-grid');
  const add=Math.min(n, MAX_PANELS-totalPanels);
  for(let i=0;i<add;i++){
    const scene=shuffledScenes[sceneIdx%shuffledScenes.length]; sceneIdx++;
    if(sceneIdx%shuffledScenes.length===0)shuffledScenes.sort(()=>Math.random()-.5);
    grid.appendChild(buildPanel(scene)); totalPanels++;
  }
}

function initGallery() {
  addGalleryBatch(3);
  sentinelObs=new IntersectionObserver(es=>{if(es[0].isIntersecting)addGalleryBatch(3);},{rootMargin:'200px'});
  sentinelObs.observe(document.getElementById('gallery-sentinel'));
}

// ══════════════════════════════════════════════
//  OBSERVERS
// ══════════════════════════════════════════════
function observeCards() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.07});
  document.querySelectorAll('.session-card,.break-card').forEach(c=>obs.observe(c));
}
function observeFadeTargets() {
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.1});
  document.querySelectorAll('.fade-target').forEach(el=>obs.observe(el));
}

// ══════════════════════════════════════════════
//  FETCH LOG
// ══════════════════════════════════════════════
async function fetchLog() {
  const url=`https://raw.githubusercontent.com/${CONFIG.githubOwner}/${CONFIG.githubRepo}/${CONFIG.githubBranch}/${CONFIG.logPath}`;
  try {
    const res=await fetch(url); if(!res.ok)throw new Error(`HTTP ${res.status}`);
    renderCards(parseSessionLog(await res.text())); animateBars();
  } catch(err) {
    document.getElementById('log-container').innerHTML=`<div style="text-align:center;padding:2rem;color:var(--pending-color)"><p>Could not fetch session log.</p><p style="font-size:.78rem;opacity:.45;margin-top:.4rem">${err.message}</p></div>`;
    animateBars();
  }
}

function scrollToContent(){document.getElementById('content').scrollIntoView({behavior:'smooth'});}

setPageBackground();
setQuote();
buildMission();
observeFadeTargets();
fetchLog();
initGallery();
