<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Reply DevLog</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7c6fff;
      --accent2: #ff6fb8;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.13);
      --text: #f0eeff;
      --muted: rgba(240,238,255,0.55);
      --done-color: #5fffa0;
      --pending-color: #ffb347;
      --bg-from: #0d0d1a;
      --bg-to: #1a0d2e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg-from);
    }

    /* ── ANIMATED BACKGROUND ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid, #1a0d2e) 50%, var(--bg-to) 100%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(20deg) brightness(1.1); }
    }

    /* Stars */
    .star {
      position: fixed; border-radius: 50%;
      background: white; z-index: 1;
      animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: var(--max-op, 0.7); transform: scale(1.2); }
    }

    /* ── HERO ── */
    #hero {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      cursor: pointer;
    }

    #quote-block {
      max-width: 700px;
      animation: floatY 6s ease-in-out infinite alternate;
    }
    @keyframes floatY {
      0%   { transform: translateY(0px); }
      100% { transform: translateY(-14px); }
    }

    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 12vw, 9rem);
      line-height: 0.5;
      color: var(--accent);
      opacity: 0.35;
      display: block;
      margin-bottom: -1.5rem;
    }

    #quote-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 3.5vw, 2.1rem);
      line-height: 1.55;
      font-style: italic;
      color: var(--text);
      text-shadow: 0 2px 40px rgba(0,0,0,0.6);
      margin-bottom: 1.4rem;
    }

    #quote-author {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.85;
    }

    .hero-hint {
      position: absolute; bottom: 2.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }
    .hero-hint svg { opacity: 0.5; }

    .tag {
      display: inline-block;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.8rem;
      font-weight: 600;
    }

    /* ── CONTENT SECTION ── */
    #content {
      position: relative; z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 6rem;
    }

    /* ── MISSION CARD ── */
    .mission-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.2rem 2.5rem;
      margin-bottom: 3rem;
      position: relative;
      overflow: hidden;
    }
    .mission-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .mission-label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.7rem;
    }
    .mission-text {
      font-size: 1.15rem; line-height: 1.7;
      color: var(--text); font-weight: 300;
      margin-bottom: 1.8rem;
    }

    /* Progress bars */
    .milestones { display: flex; flex-direction: column; gap: 0.75rem; }
    .milestone-row { display: flex; align-items: center; gap: 1rem; }
    .milestone-name {
      font-size: 0.8rem; font-weight: 500;
      color: var(--muted); white-space: nowrap;
      min-width: 180px;
    }
    .bar-track {
      flex: 1; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
      width: 0;
    }
    .milestone-pct {
      font-size: 0.75rem; font-weight: 600;
      color: var(--accent); min-width: 2.5rem; text-align: right;
    }

    /* ── SESSION CARDS ── */
    .section-title {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: var(--glass-border);
    }

    .session-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 1.8rem 2rem;
      margin-bottom: 1.2rem;
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .session-card.visible { opacity: 1; transform: translateY(0); }
    .session-card:hover {
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.09);
    }

    .card-date {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.3rem;
    }
    .card-title {
      font-size: 1.05rem; font-weight: 600;
      color: var(--text); margin-bottom: 1.2rem;
      line-height: 1.4;
    }

    .items-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .items-col { grid-template-columns: 1fr; } }

    .items-group {}
    .items-group h4 {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .items-group.done h4 { color: var(--done-color); }
    .items-group.pending h4 { color: var(--pending-color); }

    .item {
      font-size: 0.85rem; line-height: 1.55;
      color: var(--muted);
      display: flex; gap: 0.5rem;
      margin-bottom: 0.45rem;
    }
    .item-dot {
      margin-top: 0.35em; flex-shrink: 0;
      width: 6px; height: 6px; border-radius: 50%;
    }
    .done .item-dot { background: var(--done-color); }
    .pending .item-dot { background: var(--pending-color); }

    /* strikethrough for completed pending items */
    .item.crossed { text-decoration: line-through; opacity: 0.4; }

    /* ── LOADING ── */
    #loading {
      text-align: center; padding: 3rem;
      color: var(--muted); font-size: 0.9rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--glass-border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── THEME PICKER ── */
    #theme-switcher {
      position: fixed; top: 1.2rem; right: 1.2rem; z-index: 100;
      display: flex; gap: 0.4rem;
    }
    .theme-dot {
      width: 12px; height: 12px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
    }
    .theme-dot:hover, .theme-dot.active {
      transform: scale(1.4); border-color: white;
    }

    /* scroll fade-in observer target */
    .fade-target { opacity: 0; transform: translateY(20px); transition: opacity 0.6s, transform 0.6s; }
    .fade-target.visible { opacity: 1; transform: none; }
  </style>
</head>
<body>

<div id="bg"></div>

<!-- Stars injected by JS -->

<div id="theme-switcher"></div>

<!-- HERO -->
<section id="hero" onclick="scrollToContent()">
  <div class="tag">✦ SGReply DevLog</div>
  <div id="quote-block">
    <span class="quote-mark">"</span>
    <p id="quote-text">Loading…</p>
    <p id="quote-author"></p>
  </div>
  <div class="hero-hint">
    <span>scroll to see the log</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
  </div>
</section>

<!-- CONTENT -->
<section id="content">
  <div class="mission-card fade-target">
    <div class="mission-label">✦ The Mission</div>
    <p class="mission-text" id="mission-text"></p>
    <div class="milestones" id="milestones"></div>
  </div>

  <div class="section-title">Session Log</div>
  <div id="log-container">
    <div id="loading">
      <div class="spinner"></div>
      <span>Fetching latest session log…</span>
    </div>
  </div>
</section>

<script>
// ════════════════════════════════════════════════
//  CONFIG — edit these to match your setup
// ════════════════════════════════════════════════
const CONFIG = {
  // Your GitHub username (owner of the sgreply repo)
  githubOwner: 'tsng_bryan',
  githubRepo:  'sgreply',
  githubBranch: 'main',
  logPath: '.claude/session-log.md',

  mission: 'Building SGReply — AI-powered WhatsApp auto-reply for Singapore SMEs. Help thousands of businesses respond to customers 24/7 without extra staff. One bot, any industry, set up in minutes.',

  milestones: [
    { name: 'M1 · Foundation',               pct: 80 },
    { name: 'M2 · Multi-tenant + Handoff',   pct: 8  },
    { name: 'M3 · Payments + Analytics',     pct: 0  },
  ],
};

// ════════════════════════════════════════════════
//  THEMES
// ════════════════════════════════════════════════
const THEMES = [
  { name: 'Cosmic',    from: '#0a0a1f', mid: '#1a0a2e', to: '#0a1a2f', accent: '#7c6fff', accent2: '#ff6fb8',  dot: '#7c6fff' },
  { name: 'Tokyo',     from: '#0d0d0d', mid: '#1a001a', to: '#001a0d', accent: '#ff2d9b', accent2: '#00fff7',  dot: '#ff2d9b' },
  { name: 'Ocean',     from: '#020d1a', mid: '#04254a', to: '#041a3a', accent: '#00b4ff', accent2: '#00ffd0',  dot: '#00b4ff' },
  { name: 'Ember',     from: '#150500', mid: '#2d0f00', to: '#1a0500', accent: '#ff6a00', accent2: '#ffca28',  dot: '#ff6a00' },
  { name: 'Forest',    from: '#030f08', mid: '#0a2412', to: '#040d0b', accent: '#4cff91', accent2: '#aaff44',  dot: '#4cff91' },
  { name: 'Aurora',    from: '#030d18', mid: '#062c26', to: '#0d0318', accent: '#00ffc8', accent2: '#c87fff',  dot: '#00ffc8' },
  { name: 'Sakura',    from: '#1a0012', mid: '#2e0a20', to: '#1a0018', accent: '#ff8fc8', accent2: '#ffc1e3',  dot: '#ff8fc8' },
  { name: 'Obsidian',  from: '#080808', mid: '#111111', to: '#0a0a0a', accent: '#e0e0e0', accent2: '#aaaaaa',  dot: '#e0e0e0' },
];

// ════════════════════════════════════════════════
//  QUOTES
// ════════════════════════════════════════════════
const QUOTES = [
  { q: "Design is not just what it looks like and feels like. Design is how it works.", a: "Steve Jobs" },
  { q: "The only way to do great work is to love what you do.", a: "Steve Jobs" },
  { q: "If you're not embarrassed by the first version of your product, you've launched too late.", a: "Reid Hoffman" },
  { q: "Done is better than perfect.", a: "Sheryl Sandberg" },
  { q: "Make something people want.", a: "Paul Graham" },
  { q: "Simplicity is the ultimate sophistication.", a: "Leonardo da Vinci" },
  { q: "The best way to predict the future is to create it.", a: "Peter Drucker" },
  { q: "Build something 100 people love, not something 1 million people kind of like.", a: "Brian Chesky" },
  { q: "The secret of getting ahead is getting started.", a: "Mark Twain" },
  { q: "Move fast. Break things. Learn faster.", a: "Eric Ries" },
  { q: "Perfection is the enemy of progress.", a: "Winston Churchill" },
  { q: "You can't connect the dots looking forward; you can only connect them looking backward.", a: "Steve Jobs" },
  { q: "Chase the vision, not the money; the money will end up following you.", a: "Tony Hsieh" },
  { q: "Your most unhappy customers are your greatest source of learning.", a: "Bill Gates" },
  { q: "It's not about ideas. It's about making ideas happen.", a: "Scott Belsky" },
  { q: "Ships that stay in harbor are safe, but that's not what ships are for.", a: "John A. Shedd" },
  { q: "Innovation distinguishes between a leader and a follower.", a: "Steve Jobs" },
  { q: "The way to get started is to quit talking and begin doing.", a: "Walt Disney" },
  { q: "Stay hungry, stay foolish.", a: "Steve Jobs" },
  { q: "Work hard in silence. Let success be the noise.", a: "Frank Ocean" },
  { q: "Every line of code you write is a decision. Make them count.", a: "Unknown" },
  { q: "Small progress is still progress.", a: "Unknown" },
];

// ════════════════════════════════════════════════
//  THEME INIT
// ════════════════════════════════════════════════
let currentThemeIdx = parseInt(localStorage.getItem('devlog-theme') ?? Math.floor(Math.random() * THEMES.length));

function applyTheme(idx) {
  currentThemeIdx = idx;
  localStorage.setItem('devlog-theme', idx);
  const t = THEMES[idx];
  const r = document.documentElement.style;
  r.setProperty('--accent',    t.accent);
  r.setProperty('--accent2',   t.accent2);
  r.setProperty('--bg-from',   t.from);
  r.setProperty('--bg-mid',    t.mid);
  r.setProperty('--bg-to',     t.to);
  document.querySelectorAll('.theme-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function buildThemeSwitcher() {
  const sw = document.getElementById('theme-switcher');
  THEMES.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'theme-dot';
    d.title = t.name;
    d.style.background = t.dot;
    d.onclick = (e) => { e.stopPropagation(); applyTheme(i); };
    sw.appendChild(d);
  });
  applyTheme(currentThemeIdx);
}

// ════════════════════════════════════════════════
//  STARS
// ════════════════════════════════════════════════
function makeStars(n = 80) {
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw; top:${Math.random()*100}vh;
      --dur:${(Math.random()*4+2).toFixed(1)}s;
      --max-op:${(Math.random()*0.6+0.2).toFixed(2)};
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    document.body.appendChild(s);
  }
}

// ════════════════════════════════════════════════
//  QUOTE
// ════════════════════════════════════════════════
function setQuote() {
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  document.getElementById('quote-text').textContent = q.q;
  document.getElementById('quote-author').textContent = '— ' + q.a;
}

// ════════════════════════════════════════════════
//  MISSION + MILESTONES
// ════════════════════════════════════════════════
function buildMission() {
  document.getElementById('mission-text').textContent = CONFIG.mission;
  const container = document.getElementById('milestones');
  CONFIG.milestones.forEach(m => {
    const row = document.createElement('div');
    row.className = 'milestone-row';
    row.innerHTML = `
      <span class="milestone-name">${m.name}</span>
      <div class="bar-track"><div class="bar-fill" data-pct="${m.pct}" style="width:0%"></div></div>
      <span class="milestone-pct">${m.pct}%</span>
    `;
    container.appendChild(row);
  });
}

function animateBars() {
  document.querySelectorAll('.bar-fill').forEach(b => {
    setTimeout(() => { b.style.width = b.dataset.pct + '%'; }, 200);
  });
}

// ════════════════════════════════════════════════
//  PARSE SESSION LOG MARKDOWN
// ════════════════════════════════════════════════
function parseSessionLog(md) {
  // Split on '---' horizontal rules (entry separators)
  const rawEntries = md.split(/\n---\n/).filter(s => s.trim());

  // Skip the title block (first block before any ## heading)
  const entries = rawEntries.filter(e => /^##\s/m.test(e));

  return entries.map(entry => {
    const lines = entry.trim().split('\n');

    // First ## line is the heading
    const headingLine = lines.find(l => /^##\s/.test(l)) || '';
    const headingText = headingLine.replace(/^##\s*/, '').trim();

    // Extract date (YYYY-MM-DD) from heading
    const dateMatch = headingText.match(/(\d{4}-\d{2}-\d{2})/);
    const date = dateMatch ? dateMatch[1] : '';

    // Extract subtitle (after the —)
    const subtitle = headingText.replace(/^[\d-]+\s*[—–-]\s*/, '').trim();

    // Parse ### Done and ### Pending sections
    const doneItems    = extractItems(entry, 'Done');
    const pendingItems = extractItems(entry, 'Pending');

    return { date, subtitle, doneItems, pendingItems };
  });
}

function extractItems(section, heading) {
  const regex = new RegExp(`###\\s*${heading}\\s*\\n([\\s\\S]*?)(?=###|$)`, 'i');
  const match = section.match(regex);
  if (!match) return [];

  return match[1]
    .split('\n')
    .filter(l => l.trim().startsWith('-'))
    .map(l => {
      const text = l.replace(/^-\s*/, '').trim();
      const crossed = /~~.*~~/.test(text);
      const clean = text
        .replace(/~~(.*?)~~/g, '$1')
        .replace(/✅.*$/, '')
        .replace(/\*\*(.*?)\*\*/g, '$1')  // remove bold
        .trim();
      return { text: clean, crossed };
    });
}

// ════════════════════════════════════════════════
//  RENDER SESSION CARDS
// ════════════════════════════════════════════════
function renderCards(entries) {
  const container = document.getElementById('log-container');
  container.innerHTML = '';

  if (!entries.length) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem">No entries found in session log.</p>';
    return;
  }

  entries.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'session-card';
    card.style.transitionDelay = `${i * 80}ms`;

    const doneHtml = e.doneItems.map(item =>
      `<div class="item${item.crossed ? ' crossed' : ''}">
        <span class="item-dot"></span>
        <span>${item.text}</span>
      </div>`
    ).join('');

    const pendingHtml = e.pendingItems.map(item =>
      `<div class="item${item.crossed ? ' crossed' : ''}">
        <span class="item-dot"></span>
        <span>${item.text}</span>
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="card-date">${formatDate(e.date)}</div>
      <div class="card-title">${e.subtitle || 'Session'}</div>
      <div class="items-col">
        <div class="items-group done">
          <h4>✓ Done</h4>
          ${doneHtml || '<div class="item"><span class="item-dot"></span><span style="opacity:.4">—</span></div>'}
        </div>
        <div class="items-group pending">
          <h4>→ Pending</h4>
          ${pendingHtml || '<div class="item"><span class="item-dot"></span><span style="opacity:.4">—</span></div>'}
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Intersection observer for fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.session-card').forEach(c => observer.observe(c));
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', {
      weekday: 'short', day: 'numeric', month: 'long', year: 'numeric'
    });
  } catch { return dateStr; }
}

// ════════════════════════════════════════════════
//  FETCH MARKDOWN
// ════════════════════════════════════════════════
async function fetchLog() {
  if (CONFIG.githubOwner === 'YOUR_GITHUB_USERNAME') {
    document.getElementById('loading').innerHTML = `
      <span style="color:var(--pending-color)">⚠ Set your GitHub username in <code>CONFIG.githubOwner</code> inside <code>index.html</code></span>`;
    return;
  }

  const url = `https://raw.githubusercontent.com/${CONFIG.githubOwner}/${CONFIG.githubRepo}/${CONFIG.githubBranch}/${CONFIG.logPath}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    const entries = parseSessionLog(md);
    renderCards(entries);
    animateBars();
  } catch (err) {
    document.getElementById('log-container').innerHTML = `
      <div style="text-align:center;padding:2rem;color:var(--pending-color)">
        <p style="margin-bottom:.5rem">Could not fetch session log.</p>
        <p style="font-size:.8rem;opacity:.6">${err.message}</p>
        <p style="font-size:.75rem;opacity:.5;margin-top:.5rem">Make sure the repo is public, or open this file via a local server.</p>
      </div>`;
    animateBars();
  }
}

//  SCROLL HELPER

function scrollToContent() {
  document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
}

// Fade-in observer for mission card
function observeFadeTargets() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.fade-target').forEach(el => obs.observe(el));
}

makeStars(100);
setQuote();
buildMission();
observeFadeTargets();
